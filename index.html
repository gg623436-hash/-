<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TaskFlow — Умный планировщик задач</title>
    <meta name="description" content="Современный планировщик задач с напоминаниями">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
    <!-- Анимированный фон -->
    <div class="animated-bg"></div>
    
    <div class="container">
        <!-- Шапка -->
        <header>
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 8v4l3 3M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
                    <path d="M12 6v2M12 16v2"/>
                </svg>
                <h1>TaskFlow</h1>
            </div>
            <div style="display: flex; align-items: center; gap: 16px;">
                <div class="header-stats">
                    <div class="stat-card" id="statTotal">
                        <span class="stat-value">0</span>
                        <span class="stat-label">Всего</span>
                    </div>
                    <div class="stat-card" id="statActive">
                        <span class="stat-value">0</span>
                        <span class="stat-label">Активных</span>
                    </div>
                    <div class="stat-card" id="statCompleted">
                        <span class="stat-value">0</span>
                        <span class="stat-label">Выполнено</span>
                    </div>
                </div>
                <button id="notificationBtn" class="notif-btn">🔔 Включить уведомления</button>
            </div>
        </header>

        <!-- Форма добавления -->
        <div class="add-card">
            <div class="add-card-inner">
                <input type="text" id="taskTitle" placeholder="Что нужно сделать?" autocomplete="off">
                <input type="datetime-local" id="taskDateTime">
                <button id="addTaskBtn" class="btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    Добавить
                </button>
            </div>
        </div>

        <!-- Фильтры -->
        <div class="filters-wrapper">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                    </svg>
                    Все
                </button>
                <button class="filter-btn" data-filter="active">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                    Активные
                </button>
                <button class="filter-btn" data-filter="completed">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 6L9 17l-5-5"/>
                    </svg>
                    Выполненные
                </button>
            </div>
            <div class="actions">
                <button id="exportBtn" class="action-btn" title="Экспорт">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </button>
                <button id="importBtn" class="action-btn" title="Импорт">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </button>
                <button id="clearAllBtn" class="action-btn danger" title="Очистить всё">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Список задач -->
        <div id="tasksList" class="tasks-list">
            <div class="empty-state">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 8v4l3 3M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
                </svg>
                <h3>Нет задач</h3>
                <p>Добавьте свою первую задачу!</p>
            </div>
        </div>
    </div>

    <!-- Модальное окно редактирования -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✏️ Редактировать задачу</h3>
                <button class="modal-close">&times;</button>
            </div>
            <input type="text" id="editTitle" class="modal-input" placeholder="Название задачи">
            <div class="modal-buttons">
                <button id="saveEditBtn" class="btn-primary">Сохранить</button>
                <button id="closeModalBtn" class="btn-secondary">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Уведомление (тост) -->
    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registered:', reg))
                .catch(err => console.log('SW error:', err));
        }
    </script>
</body>
</html>
